# =============================================================
# COPY THIS ENTIRE FILE TO: .github/workflows/deploy.yml
# =============================================================
#
# HOW TO DO IT ON GITHUB (web UI — no terminal needed):
#
# 1. Open: https://github.com/semprog25/Driverguidehamburg
# 2. Click the pencil icon (Edit) on .github/workflows/deploy.yml
#    — OR if the file doesn't exist yet:
#    Click "Add file" > "Create new file"
#    then type the path:  .github/workflows/deploy.yml
# 3. Select ALL the text below (from "name:" to the end)
#    and paste it, replacing whatever is there now
# 4. Scroll down → click "Commit changes"
#    → choose "Commit directly to the main branch"
#    → click "Commit changes"
#
# After committing, go to Actions tab → "Deploy to GitHub Pages"
# → "Run workflow" → "Run workflow" to trigger manually.
# =============================================================

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
